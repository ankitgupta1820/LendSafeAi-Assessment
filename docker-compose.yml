version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - LLM_WRAPPER_TOKEN=${LLM_WRAPPER_TOKEN}
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:80
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: always
